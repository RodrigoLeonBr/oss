services:
  db:
    image: mysql:8.0
    container_name: oss_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-oss}
      MYSQL_USER: ${DB_USER:-ossuser}
      MYSQL_PASSWORD: ${DB_PASS:-rootpass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASS:-rootpass}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: oss_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: oss_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3001}
      DB_HOST: db
      DB_USER: ${DB_USER:-ossuser}
      DB_PASS: ${DB_PASS:-rootpass}
      DB_NAME: ${DB_NAME:-oss}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ACCESS_EXPIRATION_MINUTES: ${JWT_ACCESS_EXPIRATION_MINUTES:-60}
      JWT_REFRESH_EXPIRATION_DAYS: ${JWT_REFRESH_EXPIRATION_DAYS:-30}
      LOG_FOLDER: logs/
      LOG_FILE: "%DATE%-app-log.log"
      LOG_LEVEL: ${LOG_LEVEL:-error}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_USE_PASSWORD: ${REDIS_USE_PASSWORD:-no}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${PORT:-3001}:3001"
    volumes:
      - app_logs:/usr/src/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  db_data:
  redis_data:
  app_logs:
